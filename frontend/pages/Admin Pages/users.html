<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý người dùng - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/Admin css/admin-shared.css">
</head>
<body class="bg-light">
  <div id="navbar"></div>

  <main class="admin-content">
    
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-2">
      <div class="search-container flex-grow-1 me-5" style="max-width: 600px;">
        <input type="text" id="searchInput" class="form-control rounded-pill px-4" placeholder="Tìm kiếm,.....">
        <i class="bi bi-search search-icon"></i>
      </div>
      
      <div class="admin-profile d-flex align-items-center gap-2">
        <img src="https://ui-avatars.com/api/?name=Admin+B&background=random" class="rounded-circle shadow-sm" width="45" height="45" alt="Admin">
        <span class="fw-bold text-primary fs-5">Nguyễn Thị B</span>
      </div>
    </div>

    <div class="d-flex align-items-center gap-5 mb-4 filter-row">
      <div class="fw-bold fs-5"><i class="bi bi-funnel"></i> Lọc theo:</div>
      
      <div class="dropdown">
        <button class="btn btn-link text-dark text-decoration-none dropdown-toggle p-0 fs-5" type="button" data-bs-toggle="dropdown">
          Vai trò <span id="roleLabel" class="text-primary fs-6 ms-1"></span>
        </button>
        <ul class="dropdown-menu shadow-sm border-0">
          <li><a class="dropdown-item filter-role" href="#" data-value="">Tất cả</a></li>
          <li><a class="dropdown-item filter-role" href="#" data-value="hr">Nhà tuyển dụng</a></li>
          <li><a class="dropdown-item filter-role" href="#" data-value="candidate">Ứng viên</a></li>
        </ul>
      </div>

      <div class="dropdown">
        <button class="btn btn-link text-dark text-decoration-none dropdown-toggle p-0 fs-5" type="button" data-bs-toggle="dropdown">
          Trạng thái <span id="statusLabel" class="text-primary fs-6 ms-1"></span>
        </button>
        <ul class="dropdown-menu shadow-sm border-0">
          <li><a class="dropdown-item filter-status" href="#" data-value="">Tất cả</a></li>
          <li><a class="dropdown-item filter-status" href="#" data-value="active">Hoạt động</a></li>
          <li><a class="dropdown-item filter-status" href="#" data-value="inactive">Bị khóa</a></li>
        </ul>
      </div>
    </div>

    <div id="usersList" class="d-flex flex-column gap-3 mb-5">
      <div class="text-center py-5 text-muted">Đang tải dữ liệu...</div>
    </div>

    <nav aria-label="Page navigation">
      <ul class="pagination justify-content-center" id="pagination">
        </ul>
    </nav>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/utils/loadNavbarAdmin.js"></script>
  <script src="../../js/Admin js/users.js"></script>
</body>
</html>
