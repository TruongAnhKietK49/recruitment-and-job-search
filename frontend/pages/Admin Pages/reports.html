<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Báo cáo & Thống kê - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/utils/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="../../css/Admin css/style_admin.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="admin-content">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
      <div>
        <h3 class="fw-bold text-dark mb-1">Báo cáo & Phân tích Dữ liệu</h3>
        <p class="text-muted mb-0">Theo dõi sự phát triển của hệ thống tuyển dụng</p>
      </div>
      <button class="btn btn-primary shadow-sm rounded-pill px-4 fw-medium btn-print" onclick="window.print()">
        <i class="bi bi-printer me-2"></i>Xuất báo cáo
      </button>
    </div>
    
    <div class="row g-4 mb-4">
      
      <div class="col-xl-4 col-md-6">
        <div class="chart-card">
          <div class="chart-title"><i class="bi bi-people text-primary fs-4"></i> Cơ cấu người dùng</div>
          <div class="chart-container">
            <canvas id="userPieChart"></canvas>
          </div>
        </div>
      </div>

      <div class="col-xl-4 col-md-6">
        <div class="chart-card">
          <div class="chart-title"><i class="bi bi-buildings text-info fs-4"></i> Trạng thái doanh nghiệp</div>
          <div class="chart-container">
            <canvas id="companyPieChart"></canvas>
          </div>
        </div>
      </div>

      <div class="col-xl-4 col-md-12">
        <div class="chart-card">
          <div class="chart-title"><i class="bi bi-file-earmark-text text-success fs-4"></i> Tỉ lệ kiểm duyệt việc làm</div>
          <div class="chart-container">
            <canvas id="jobStatusChart"></canvas>
          </div>
        </div>
      </div>

    </div>

    <div class="row g-4">
      <div class="col-12">
        <div class="chart-card">
          <div class="chart-title"><i class="bi bi-bar-chart-line-fill text-warning fs-4"></i> Thống kê việc làm theo danh mục</div>
          <div class="bar-chart-container">
            <canvas id="categoryBarChart"></canvas>
          </div>
        </div>
      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../js/utils/loadNavbarAdmin.js"></script>
  <script type="module" src="../../js/Admin js/reports.js"></script>
</body>
</html>
