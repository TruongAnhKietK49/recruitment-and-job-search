<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đơn ứng tuyển</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/Candidate css/applications.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <h2 class="mb-4">Đơn ứng tuyển</h2>
    <div class="mb-3">
      <label class="form-label">Lọc theo trạng thái:</label>
      <select id="statusFilter" class="form-select w-auto d-inline-block ms-2">
        <option value="">Tất cả</option>
        <option value="pending">Chờ duyệt</option>
        <option value="reviewing">Đang xem xét</option>
        <option value="accepted">Đã chấp nhận</option>
        <option value="rejected">Đã từ chối</option>
      </select>
    </div>
    <div id="applicationsList">
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/utils/loadNavbar.js"></script>
  <script src="../../js/utils/loadFooter.js"></script>
  <script src="../../js/Candidate js/applications.js"></script>
</body>
</html>
