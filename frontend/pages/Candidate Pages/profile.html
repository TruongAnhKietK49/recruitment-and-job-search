<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hồ sơ cá nhân - JOB WEBSITE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/utils/style.css">
  <link rel="stylesheet" href="../../css/Candidate css/profile.css">
</head>
<body class="bg-light">
  <div id="navbar"></div>

  <main class="container py-5">
    <div class="row g-4">
      
      <div class="col-lg-4 col-xl-3">
        <div class="sidebar-card text-center mb-4">
          <div class="avatar-wrapper mb-3" id="avatarWrapper">
            <div class="profile-avatar d-flex align-items-center justify-content-center text-muted fs-1">
              <i class="bi bi-person"></i> </div>
            <button class="btn-camera"><i class="bi bi-camera"></i></button>
          </div>
          <h4 class="fw-bold mb-4" id="sidebarName">Đang tải...</h4>
          <div class="text-start mt-4">
            <a href="#" class="change-password-link"><i class="bi bi-key"></i> Đổi mật khẩu</a>
          </div>
        </div>

        <div class="sidebar-nav">
          <a href="my-cvs.html" class="nav-item">CV của tôi</a>
          <a href="saved-jobs.html" class="nav-item">Việc làm đã lưu</a>
          <a href="applications.html" class="nav-item">Việc làm đã ứng tuyển</a>
          <a href="viewed-jobs.html" class="nav-item">Việc làm đã xem</a>
        </div>
      </div>

      <div class="col-lg-8 col-xl-9">
        <div class="main-form-card" id="profileData">
          <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Đang tải...</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <div class="modal fade" id="avatarUrlModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="border-radius: 16px; border: none;">
        <div class="modal-header border-0 pb-0 pt-4 px-4">
          <h5 class="modal-title fw-bold text-primary">Cập nhật ảnh đại diện</h5>
          <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <div class="mb-3">
            <label class="form-label fw-medium">Đường dẫn ảnh (URL)</label>
            <input type="url" class="form-control" id="inputAvatarUrl" placeholder="https://..." required>
            <div class="form-text">Mẹo: Bạn có thể copy địa chỉ hình ảnh và dán vào đây.</div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="button" class="btn btn-light rounded-pill flex-grow-1" data-bs-dismiss="modal">Hủy</button>
            <button type="button" class="btn btn-primary rounded-pill flex-grow-1" id="btnSaveAvatarUrl">Lưu ảnh</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="border-radius: 16px; border: none;">
        <div class="modal-header border-0 pb-0 pt-4 px-4">
          <h5 class="modal-title fw-bold text-primary">Đổi mật khẩu</h5>
          <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <form id="changePasswordForm">
            <div class="mb-3">
              <label class="form-label fw-medium">Mật khẩu hiện tại</label>
              <input type="password" class="form-control" name="currentPassword" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-medium">Mật khẩu mới</label>
              <input type="password" class="form-control" name="newPassword" required minlength="6">
            </div>
            <div class="mb-4">
              <label class="form-label fw-medium">Xác nhận mật khẩu mới</label>
              <input type="password" class="form-control" name="confirmPassword" required minlength="6">
            </div>
            <div class="d-flex gap-2">
              <button type="button" class="btn btn-light rounded-pill flex-grow-1" data-bs-dismiss="modal">Hủy</button>
              <button type="submit" class="btn btn-primary rounded-pill flex-grow-1" id="btnSubmitPassword">Xác nhận đổi</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/utils/loadNavbar.js"></script>
  <script src="../../js/utils/loadFooter.js"></script>
  <script type="module" src="../../js/Candidate js/profile.js"></script>
</body>
</html>
