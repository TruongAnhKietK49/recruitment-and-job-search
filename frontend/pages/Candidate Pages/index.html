<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang chủ - JOB WEBSITE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/utils/style.css">
  <link rel="stylesheet" href="../../css/Candidate css/home.css">
</head>
<body>
  <div id="navbar"></div>

  <section class="hero-section position-relative overflow-hidden">
    
    <div id="heroCarousel" class="carousel slide carousel-fade position-absolute w-100 h-100 top-0 start-0" data-bs-ride="carousel" data-bs-pause="false" data-bs-interval="4000">
      <div class="carousel-inner w-100 h-100">
        <div class="carousel-item active w-100 h-100" style="background-image: url('../../images/banner1.jpg'); background-size: cover; background-position: center;"></div>
        <div class="carousel-item w-100 h-100" style="background-image: url('../../images/banner2.jpg'); background-size: cover; background-position: center;"></div>
        <div class="carousel-item w-100 h-100" style="background-image: url('../../images/banner3.jpg'); background-size: cover; background-position: center;"></div>
        <div class="carousel-item w-100 h-100" style="background-image: url('../../images/banner4.jpg'); background-size: cover; background-position: center;"></div>
      </div>
    </div>

    <div class="hero-overlay position-absolute w-100 h-100 top-0 start-0" style="background: rgba(0, 0, 0, 0.3); z-index: 1;"></div>

    <div class="hero-content container position-relative text-center text-white" style="z-index: 2;">
      <h1 class="hero-title text-white" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">Tìm kiếm công việc mơ ước của bạn ngay hôm nay</h1>
      <div class="hero-search mx-auto mt-5" style="max-width: 800px;">
        <div class="d-flex bg-white rounded-pill p-2 shadow align-items-center flex-wrap">
          <div class="flex-grow-1 border-end px-3 d-flex align-items-center search-input-wrap">
            <i class="bi bi-search text-muted me-2"></i>
            <input type="text" id="heroSearchInput" class="form-control border-0 shadow-none form-control-lg" placeholder="Vị trí tuyển dụng, tên công việc...">
          </div>
          <div class="flex-grow-1 px-3 d-flex align-items-center location-select-wrap">
            <i class="bi bi-geo-alt text-muted me-2"></i>
            <select class="form-select border-0 shadow-none text-muted form-select-lg">
              <option value="">Địa điểm</option>
              <option value="HN">Hà Nội</option>
              <option value="HCM">TP.HCM</option>
            </select>
          </div>
          <button class="btn btn-primary rounded-pill px-4 py-2 btn-lg" id="heroSearchBtn">Tìm kiếm</button>
        </div>
      </div>
    </div>

    <button class="carousel-control-prev custom-nav-btn" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev" style="z-index: 3;">
      <span class="nav-icon-wrap"><i class="bi bi-chevron-left"></i></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next custom-nav-btn" type="button" data-bs-target="#heroCarousel" data-bs-slide="next" style="z-index: 3;">
      <span class="nav-icon-wrap"><i class="bi bi-chevron-right"></i></span>
      <span class="visually-hidden">Next</span>
    </button>
  </section>

  <div class="filter-bar">
    <div class="container">
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label text-uppercase text-muted fw-500 fs-sm mb-1">Danh mục</label>
          <select id="categoryFilter" class="form-select form-select-lg">
            <option value="">Tất cả ngành nghề</option>
            <option value="IT">Công nghệ thông tin</option>
            <option value="Marketing">Marketing</option>
            <option value="Kế toán">Kế toán</option>
            <option value="Hành chính">Hành chính</option>
            <option value="Vận hành">Vận hành</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label text-uppercase text-muted fw-500 fs-sm mb-1">Hình thức làm việc</label>
          <select id="typeFilter" class="form-select form-select-lg">
            <option value="">Tất cả</option>
            <option value="full-time">Full-time</option>
            <option value="part-time">Part-time</option>
            <option value="internship">Internship</option>
            <option value="remote">Remote</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label text-uppercase text-muted fw-500 fs-sm mb-1">Mức lương</label>
          <select id="salaryFilter" class="form-select form-select-lg">
            <option value="">Tất cả</option>
            <option value="0-10">Dưới 10 triệu</option>
            <option value="10-20">10 - 20 triệu</option>
            <option value="20-30">20 - 30 triệu</option>
            <option value="30-50">30 - 50 triệu</option>
            <option value="50+">Trên 50 triệu</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label text-uppercase text-muted fw-500 fs-sm mb-1">Kinh nghiệm</label>
          <select id="expFilter" class="form-select form-select-lg">
            <option value="">Tất cả</option>
            <option value="0-1">Dưới 1 năm</option>
            <option value="1-3">1 - 3 năm</option>
            <option value="3-5">3 - 5 năm</option>
            <option value="5+">Trên 5 năm</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4 mt-5">
      <h2 class="section-title text-primary">Việc làm nổi bật</h2>
      <a href="#" class="view-all-link">Xem tất cả <i class="bi bi-arrow-right"></i></a>
    </div>

    <div id="jobsContainer">
      <div id="noJobsFound" class="alert alert-info text-center d-none">Không tìm thấy việc làm phù hợp.</div>
      <div id="jobsGrid" class="row">
          </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/utils/loadNavbar.js"></script>
  <script src="../../js/utils/loadFooter.js"></script>
  <script src="../../js/Candidate js/home.js"></script>
</body>
</html>
