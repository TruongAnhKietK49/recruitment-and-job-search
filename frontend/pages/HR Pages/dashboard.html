<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HR Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../../css/HR css/dashboard.css" />
  </head>

  <body>
    <div id="navbar"></div>

    <main class="main-content">
      <div class="container-fluid">
        <!-- Topbar -->
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-start align-items-lg-center gap-3 mb-4">
          <div>
            <h1 class="page-title display-5 fw-bold mb-2">Chào mừng quay trở lại 👋</h1>
            <p id="currentDateText" class="text-secondary mb-0">Đang tải ngày hiện tại...</p>
          </div>

          <div class="d-flex flex-column flex-sm-row gap-2 w-100 w-lg-auto">
            <select id="timeRangeFilter" class="form-select w-100 w-sm-auto" aria-label="Chọn khoảng thời gian">
              <option value="6">6 tháng gần nhất</option>
              <option value="12" selected>12 tháng gần nhất</option>
              <option value="all">Toàn bộ dữ liệu</option>
            </select>

            <button class="btn btn-primary" id="refreshDashboardBtn">
              <i class="bi bi-arrow-clockwise me-2"></i>
              Làm mới
            </button>
          </div>
        </div>

        <!-- Summary cards -->
        <div class="row g-3 mb-4" id="summaryCardsRow"></div>

        <!-- Row 1 -->
        <div class="row g-3 mb-4">
          <div class="col-12 col-xl-8">
            <div class="card dashboard-card h-100">
              <div class="card-body p-3 p-lg-4">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-4">
                  <div>
                    <h2 class="h5 fw-bold mb-1">Biến động nhân sự</h2>
                    <p class="text-secondary mb-0" id="companyNameText">Dữ liệu công ty</p>
                  </div>

                  <div class="d-flex flex-wrap gap-3 small text-secondary">
                    <div class="d-flex align-items-center gap-2">
                      <span class="legend-dot primary"></span>
                      <span>Tiếp nhận</span>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                      <span class="legend-dot warning"></span>
                      <span>Nghỉ việc</span>
                    </div>
                  </div>
                </div>

                <div class="chart-shell">
                  <div class="chart-tooltip bg-dark text-white rounded px-2 py-1 small shadow" id="chartTooltip"></div>
                  <svg id="staffTrendChart" viewBox="0 0 900 320" preserveAspectRatio="none" class="rounded"></svg>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12 col-xl-4">
            <div class="card dashboard-card h-100">
              <div class="card-body p-3 p-lg-4">
                <div class="mb-4">
                  <h2 class="h5 fw-bold mb-1">Tổng quan tuyển dụng</h2>
                  <p class="text-secondary mb-0">Các chỉ số nổi bật trong kỳ hiện tại</p>
                </div>

                <div id="recruitmentOverviewList" class="d-grid gap-3"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Row 2 -->
        <div class="row g-3">
          <div class="col-12 col-lg-12">
            <div class="card dashboard-card h-100">
              <div class="card-body p-3 p-lg-4">
                <div class="mb-4">
                  <h2 class="h5 fw-bold mb-1">Hoạt động gần đây</h2>
                  <p class="text-secondary mb-0">Cập nhật mới nhất từ tuyển dụng và nhân sự</p>
                </div>

                <div class="table-responsive">
                  <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                      <tr>
                        <th class="text-nowrap">Thời gian</th>
                        <th>Nội dung</th>
                        <th class="text-nowrap">Phụ trách</th>
                        <th class="text-nowrap">Trạng thái</th>
                      </tr>
                    </thead>
                    <tbody id="activityTableBody"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="../../js/utils/loadNavbarHR.js"></script>
    <script type="module" src="../../js/HR js/dashboard.js"></script>
  </body>
</html>
